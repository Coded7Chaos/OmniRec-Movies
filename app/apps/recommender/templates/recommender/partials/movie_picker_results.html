{% load recommender_extras %}
{% if not query %}
{% elif not hits %}
<p class="px-4 py-3 text-sm text-slate-500">Sin coincidencias para <strong>{{ query }}</strong>.</p>
{% else %}
<ul class="divide-y divide-slate-100">
    {% for m in hits %}
    <li>
        <button type="button"
                onclick="window.__omnirec_pickMovie({{ m.movieId }}, '{{ m.title|escapejs }}')"
                class="flex w-full items-center justify-between gap-3 px-4 py-2.5 text-left text-sm hover:bg-indigo-50 focus:bg-indigo-50 focus:outline-none">
            <span class="min-w-0">
                <span class="block truncate font-medium text-slate-900">{{ m.title }}</span>
                <span class="block truncate text-xs text-slate-500">{{ m.genres }}</span>
            </span>
            {% if m.bayesian %}
            <span class="shrink-0 rounded bg-slate-100 px-2 py-0.5 text-xs font-medium text-slate-700 tabular-nums">{{ m.bayesian|floatformat:2 }}</span>
            {% endif %}
        </button>
    </li>
    {% endfor %}
</ul>
{% endif %}
